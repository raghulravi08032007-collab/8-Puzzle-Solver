<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 8 Puzzle Solver</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <!-- Glowing background elements -->
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>

    <div class="login-container">
        <div class="glass-card login-card">
            <div class="login-header">
                <div class="logo-icon-wrap">
                    <i class="fas fa-th-large"></i>
                </div>
                <h1>8 Puzzle Solver</h1>
                <p class="subtitle">A* Algorithm Visualizer</p>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="username" placeholder="Username" required autocomplete="off">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="Password (Optional)">
                </div>

                <button type="submit" class="btn-glow-primary">
                    <span>Initiate Uplink</span>
                    <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // If already logged in, skip login page
        Auth.redirectIfLoggedIn();

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            Auth.login(user);
        });
    </script>
</body>
</html>
